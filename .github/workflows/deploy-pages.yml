# Сборка и публикация на GitHub Pages при пуше в ветку deploy
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - deploy

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Ensure index.html at project root
        run: |
          if [ ! -f index.html ] && [ -f static/index.html ]; then
            cp static/index.html index.html
          fi

      - name: Use root index.html in Vite config
        run: |
          sed -i "s|'static/index.html'|'index.html'|g" vite.config.ts
          sed -i 's|"static/index.html"|"index.html"|g' vite.config.ts

      - name: Build
        run: npm run build
        env:
          BASE_PATH: /GilgaChat/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment: github_pages
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
