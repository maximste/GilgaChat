# Сборка и публикация на GitHub Pages при пуше в ветку deploy
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - deploy

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          BASE_PATH: /GilgaChat/

      - name: Ensure index.html at dist root
        run: |
          if [ -f dist/static/index.html ]; then
            mv dist/static/index.html dist/index.html
            rm -rf dist/static
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment: github_pages
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
